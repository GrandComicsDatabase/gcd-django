name: API v2 CI

on:
  push:
    branches: [beta, api-v2]
    paths:
      - 'apps/api_v2/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/api-v2-ci.yml'
  pull_request:
    branches: [beta, api-v2]
    paths:
      - 'apps/api_v2/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/api-v2-ci.yml'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: Ruff lint
        run: ruff check apps/api_v2/

      - name: Ruff format check
        run: ruff format --check apps/api_v2/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: gcd_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            default-libmysqlclient-dev \
            libicu-dev \
            pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70"
          pip install -r requirements.txt

      - name: Create CI settings override
        run: |
          cat > settings_ci.py <<'EOF'
          from settings import *

          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.mysql',
                  'NAME': 'gcd_ci',
                  'USER': 'root',
                  'PASSWORD': 'test',
                  'HOST': '127.0.0.1',
                  'PORT': 3306,
                  'ATOMIC_REQUESTS': True,
              }
          }

          CACHES = {
              'default': {
                  'BACKEND': 'django.core.cache.backends.locmem.LocMemCache',
                  'LOCATION': 'unique-snowflake',
              }
          }

          SILENCED_SYSTEM_CHECKS = [
              'django_recaptcha.recaptcha_test_key_error',
              'models.E025',
              'fields.W903',
          ]
          EOF

      - name: Run v2 API tests
        env:
          DJANGO_SETTINGS_MODULE: settings_ci
        run: pytest apps/api_v2/tests/ -v --tb=short
